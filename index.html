<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Hub Profile</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="glass-card">
            <div class="profile-img-container">
                <img src="profile-pic.png" alt="Profile Picture" class="profile-img">
            </div>
            <h1 class="name">My Profile</h1>
            <p class="role" style="margin-bottom: 5px;">Welcome to my Social Hub</p>
            <p class="role" style="font-size: 0.75rem; margin-bottom: 25px;">designed by Dilmurod, young creative tech enthusiast</p>
            
            <div class="links">
                <a href="tg://resolve?domain=YOUR_USERNAME" class="glass-btn">
                    <i class="fab fa-telegram-plane"></i> Telegram
                </a>
                <a href="https://instagram.com/" target="_blank" class="glass-btn">
                    <i class="fab fa-instagram"></i> Instagram
                </a>
                <a href="https://facebook.com/" target="_blank" class="glass-btn">
                    <i class="fab fa-facebook-f"></i> Facebook
                </a>
                <button class="glass-btn vault-btn" onclick="openVault()">
                    <i class="fas fa-lock"></i> Password Vault
                </button>
            </div>
        </div>
    </div>

    <!-- Password Vault Modal -->
    <div class="modal-overlay" id="vaultModal">
        <div class="glass-modal">
            <div class="modal-header">
                <h2><i class="fas fa-shield-alt"></i> Password Vault</h2>
                <button class="close-btn" onclick="closeVault()"><i class="fas fa-times"></i></button>
            </div>
            <div class="vault-content">
                <div class="add-account-form">
                    <input type="text" id="accPlatform" placeholder="Platform (e.g., Instagram)">
                    <input type="text" id="accUsername" placeholder="Username">
                    <input type="password" id="accPassword" placeholder="Password">
                    <button class="action-btn" onclick="addAccount()">Add Entry</button>
                </div>
                <div class="accounts-list" id="accountsList">
                    <!-- Accounts will be injected here -->
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
